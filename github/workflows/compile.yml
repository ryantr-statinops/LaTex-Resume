name: Build and Deploy CV
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          # Chỉ định file main.tex ở thư mục gốc
          root_file: main.tex
          # Dùng xelatex để hỗ trợ ảnh và font tốt hơn
          compiler: xelatex 

      - name: Upload PDF to Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: main.pdf
          asset_name: My_Professional_CV.pdf
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload Artifact (Bản nháp)
        uses: actions/upload-artifact@v4
        with:
          name: CV-Draft
          path: main.pdf