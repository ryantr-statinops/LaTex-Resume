name: Build and Deploy CV
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: src/main.tex
          compiler: xelatex # Sử dụng xelatex trực tiếp
         

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV-Professional
          path: src/main.pdf